services:
  # Development container
  radioclaude-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: radioclaude-dev
    ports:
      - "5001:5000"
    volumes:
      - .:/app
      - /app/__pycache__
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
  # Production container
  radioclaude-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: radioclaude-prod
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - FLASK_ENV=production
    profiles:
      - prod
    restart: unless-stopped
