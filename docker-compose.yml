services:
  # Development container
  radioclaude-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: radioclaude-dev
    ports:
      - "127.0.0.1:5001:5000"
    volumes:
      - .:/app
      - /app/__pycache__
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - APP_HOST=0.0.0.0
      - STREAM_URL=${STREAM_URL:-}
      - HLS_FALLBACK_URL=${HLS_FALLBACK_URL:-}
      - METADATA_URL=${METADATA_URL:-}
      - COVER_URL=${COVER_URL:-}
  # Production container
  radioclaude-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: radioclaude-prod
    expose:
      - "5000"
    volumes:
      - uploads_data:/app/uploads
      - app_secrets:/run/radioclaude-secrets
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-}
      DATABASE_URL: postgresql://radioclaude:${POSTGRES_PASSWORD:-change-me}@postgres:5432/radioclaude
      STREAM_URL: ${STREAM_URL:-}
      HLS_FALLBACK_URL: ${HLS_FALLBACK_URL:-}
      METADATA_URL: ${METADATA_URL:-}
      COVER_URL: ${COVER_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - prod
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: radioclaude-postgres
    environment:
      POSTGRES_DB: radioclaude
      POSTGRES_USER: radioclaude
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radioclaude -d radioclaude"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - prod
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: radioclaude-nginx
    ports:
      - "5001:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    depends_on:
      radioclaude-prod:
        condition: service_healthy
    profiles:
      - prod
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  app_secrets:
