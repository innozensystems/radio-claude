map $request_method $upload_limit_key {
    default "";
    POST $binary_remote_addr;
}

limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ratings:10m rate=2r/s;
limit_req_zone $upload_limit_key zone=uploads:10m rate=1r/m;
limit_conn_zone $binary_remote_addr zone=connections:10m;

server {
    listen 80;
    server_name _;
    server_tokens off;

    client_max_body_size 32m;
    limit_conn connections 20;
    limit_conn_status 429;
    limit_req zone=general burst=30 nodelay;
    limit_req_status 429;

    location = /rate {
        limit_req zone=ratings burst=10 nodelay;
        proxy_pass http://radioclaude-prod:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /tracks {
        limit_req zone=uploads burst=3 nodelay;
        proxy_pass http://radioclaude-prod:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://radioclaude-prod:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
